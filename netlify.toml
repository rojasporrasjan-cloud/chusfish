# ════════════════════════════════════════════════════
#  Chus's Fish — Netlify config
# ════════════════════════════════════════════════════

[build]
  publish = "."

# Netlify aplica Brotli/Gzip automáticamente a todos los assets de texto.
# La compresión de imágenes reduce PNG/JPEG sin pérdida visible.
[build.processing]
  skip_processing = false

[build.processing.images]
  compress = true

[build.processing.html]
  pretty_urls = true
